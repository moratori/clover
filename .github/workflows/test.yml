name: test
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    # タイマー外(install/warm-up)のハング用バックストップ。テスト本体は
    # run-all-tests.sh 内の TEST_DURATION_TIME で別途制限する。
    timeout-minutes: 30
    env:
      # CI は非力なため、カバレッジ計装とプロファイリングを無効化してタイムアウトを回避する。
      # この変数は warm-up ステップの fasl コンパイル時点で効かせる必要があるため、
      # ステップ単位ではなく job 単位で設定する(計装済み fasl が再利用されるのを防ぐ)。
      CLOVER_DISABLE_COVERAGE: "1"
      # 内部タイムアウト(ローカルは run-all-tests.sh 既定の 300 秒のまま)。
      TEST_DURATION_TIME: "7200"
    steps:
      - uses: actions/checkout@v4
      - name: Install Roswell
        env:
          LISP: sbcl-bin
        run: |
          curl -L https://raw.githubusercontent.com/roswell/roswell/master/scripts/install-for-ci.sh | sh
      - name: Sanity check toolchain
        run: |
          which ros
          ros --version
      - name: Install libraries that cannot be installed with quicklisp
        run: |
          ros install massung/lexer
      - name: Install Graphviz (for refutation tree rendering)
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz
      - name: Warm up dependencies (compile outside the test timeout)
        # CLOVER_DISABLE_COVERAGE 有効時は計装しないので sb-cover のロードは不要。
        run: |
          ros -s clover-test -e '(format t "warmed up on ~A ~A~%" (lisp-implementation-type) (lisp-implementation-version))'
      - name: Run tests
        run: |
          bash run-all-tests.sh
